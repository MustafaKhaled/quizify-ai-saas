faq:
  title: CLF-C02 questions
  items:
    - label: Is this the current CLF-C02 exam, or the older CLF-C01?
      content: CLF-C02 — the current version that AWS launched in late 2023. The corpus and chapters are aligned to the four official domains in the latest exam guide.
    - label: How is this different from Tutorials Dojo or Stéphane Maarek?
      content: Those are excellent for learning AWS. Quizify is the practice layer — the part where you drill questions, find weak domains, and grind until your score is stable. Most candidates use both.
    - label: Are these questions copied from real AWS exam dumps?
      content: No. Dumps violate the AWS Candidate Agreement and we don't go near them. Quizify generates fresh, original questions on every run — grounded in the same syllabus AWS publishes.
    - label: Can I focus on just one domain?
      content: Yes. Pick a chapter (e.g., Security, Billing) and Quizify generates a focused quiz with analytics scoped to that domain.
    - label: How many questions can I practice?
      content: Unlimited on Pro. Run a 60-question full-length CLF-C02 quiz, or a 10-question domain drill, as often as you want.
