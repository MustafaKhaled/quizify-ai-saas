pains:
  title: Klingt das vertraut?
  description: Sound familiar? A2 is where most German learners stall — A1 felt manageable, but Dativ and Konjunktiv break the pattern.
  items:
    - You passed A1 fine but Dativ feels arbitrary — `dem` vs `den` is still a coin flip.
    - Wechselpräpositionen confuse you — when does `auf` take Akkusativ and when Dativ?
    - You can recognize Konjunktiv II forms but you can't produce them under exam pressure.
    - Subordinate clauses with `weil`, `dass`, `wenn` make you forget where the verb goes.
