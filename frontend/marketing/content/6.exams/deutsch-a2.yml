faq:
  title: A2-spezifische Fragen
  items:
    - label: Is this aligned to Goethe-Zertifikat A2, telc, or ÖSD?
      content: All three. The 15 grammar chapters cover the union of A2 syllabi — the question style is modeled on the way all three exams write items.
    - label: Will it retest A1 grammar?
      content: No. The instructions explicitly tell the AI not to waste questions retesting A1 mechanics. Every question either tests new A2 grammar or chains A2 with A1.
    - label: Which A2 grammar is covered?
      content: 15 chapters — Dativ, Wechselpräpositionen, Präteritum, Komparativ & Superlativ, Konjunktiv II (Höflichkeit), Nebensatz mit weil & dass, Nebensatz mit wenn & obwohl, Reflexivverben, Adjektivdeklination, Relativsätze, Passiv Präsens, Verben mit festen Präpositionen, Genitiv-Grundlagen, Temporalpräpositionen, Indirekte Fragen.
    - label: I haven't taken A1 yet — should I start with A2?
      content: No. A2 builds on A1. If you can't reliably conjugate regular verbs in present tense and form Akkusativ, drill the A1 track first — it's much faster than re-learning at the wrong level.
    - label: Are explanations in German?
      content: No — explanations are in English so the underlying rule is unambiguous. The only German inside an explanation is the quoted form being discussed (e.g., the article 'dem', the verb 'helfen').
