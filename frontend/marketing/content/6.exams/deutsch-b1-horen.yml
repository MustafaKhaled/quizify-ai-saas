faq:
  title: B1 Hören — häufig gestellte Fragen
  items:
    - label: Is this aligned to the official Goethe-Zertifikat B1 Hören format?
      content: Yes. Each mock contains all four Teile in the official order and shape — Teil 1 (5 short single-speaker monologues, MCQ), Teil 2 (one longer presentation, 5 MCQ), Teil 3 (two-speaker dialogue, 7 richtig/falsch), Teil 4 (three-speaker discussion, 8 "wer sagt was" MCQ).
    - label: Are the voices actually German?
      content: Yes — multi-speaker scripts use native German Azure Neural voices with distinct timbre per speaker. Teil 3 and Teil 4 sound like an actual conversation, not the same narrator with different sentences.
    - label: How long does generation take?
      content: A full 4-Teil mock takes ~2 minutes (Gemini writes the scripts, Edge TTS renders the audio for each Teil in parallel). After that, the mock is yours forever in your library — you can replay it, share it, or take it again.
    - label: How many mocks do I get?
      content: Free trial includes 1 full mock. Pro includes 5 mocks per rolling 7 days — enough for daily practice in the final exam-prep weeks without ever running out of fresh material.
    - label: Can I see the transcript?
      content: Yes. After completing the mock, every Teil shows a per-question review — the German phrase that supports each correct answer is quoted in the explanation. You can read what you missed.
    - label: Will this prepare me for the Lesen part too?
      content: No — Hören is listening only. For reading, see the Goethe-B1 Lesen track (5 Teile including the 10-ad Zuordnung task). Both modules are included in Pro.
