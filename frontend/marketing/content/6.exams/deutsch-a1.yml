pains:
  title: Klingt das vertraut?
  description: Sound familiar? German A1 prep apps teach you words, not the rules the Goethe-Zertifikat actually tests.
  items:
    - You've finished a Duolingo German tree but you still can't tell whether `'Ich helfe ___ Mann'` takes `der`, `den`, or `dem`.
    - You can't read a real Goethe-Zertifikat A1 mock exam without a dictionary — the question style is nothing like a vocabulary app.
    - You have three weeks until the exam date and no idea which Grammatik-Regel is your weakest.
    - The €130 exam fee is the smallest part of the cost — it's the months of half-prep you can't get back.
