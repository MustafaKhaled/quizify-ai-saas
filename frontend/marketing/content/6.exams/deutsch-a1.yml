faq:
  title: A1-spezifische Fragen
  items:
    - label: Is this aligned to Goethe-Zertifikat A1, telc, or ÖSD?
      content: All three. The 15 grammar chapters cover the union of A1 syllabi (Goethe-Zertifikat A1, telc Deutsch A1, ÖSD A1) — the question style is modeled on the way all three exams write items.
    - label: Are explanations in German or English?
      content: English — A1 learners can't yet parse a metalinguistic explanation in German, and the goal is for you to understand the rule. The only German inside an explanation is the quoted form being discussed.
    - label: How is this different from Duolingo, Babbel, or Lingoda?
      content: Those teach you to use German. Quizify trains you to pass an A1 exam. The question patterns, distractors, and analytics are calibrated to Goethe/telc/ÖSD style — not generic language-learning gamification.
    - label: Will it cover all A1 grammar?
      content: Yes — 15 chapters covering Personalpronomen, Verbkonjugation Präsens, sein & haben, Artikel, Nomen Genus & Plural, Nominativ, Akkusativ, Negation (nicht & kein), Possessivartikel, Modalverben, trennbare Verben, Imperativ, W-Fragen, Wortstellung im Hauptsatz, and Perfekt.
    - label: I'm preparing for A2 — should I start here?
      content: If you can already conjugate regular verbs in present tense and use Akkusativ correctly, jump straight to the A2 track. If any of those feel shaky, drill A1 first — A2 builds on it.
