faq:
  title: A2 Lesen — häufig gestellte Fragen
  items:
    - label: Is this aligned to the official Goethe-Zertifikat A2 Lesen format?
      content: Yes. Each mock contains all four Teile in the official order and shape — Teil 1 (one short newspaper article, 5 MCQ a/b/c), Teil 2 (a building directory, 5 MCQ asking which floor an item is on), Teil 3 (one personal email, 5 MCQ a/b/c), Teil 4 (6 ads a–f + 5 situations, type a letter or "X" if no match). 20 items, 30 minutes.
    - label: What's the Wegweiser task?
      content: Teil 2 of A2 Lesen — the candidate sees a building or department-store directory listing what's on each floor, then answers 5 MCQs of the form "Sie suchen <X> — wo finden Sie das?". The trick is paraphrasing — the question describes the item differently than the directory categorizes it ("ein Geschenk für ein Kind" → "Spielwaren"). Quizify generates fresh directories every time.
    - label: How is this different from the B1 Lesen track?
      content: Same architecture, different level. A2 has 4 Teile (vs B1's 5), 20 items (vs B1's 30), 30 minutes (vs B1's 65), and uses simpler vocabulary. The matching task in A2 Teil 4 has 6 ads with "X" no-match (vs B1 Teil 3 with 10 ads and "0"). If you're planning to sit A2 within ~6 months, A2 Lesen is the right starting point.
    - label: How long does generation take?
      content: A full 4-Teil mock takes ~10 seconds on Gemini 2.5 Flash. All four Teile are generated in parallel.
    - label: How many mocks do I get?
      content: Free trial includes 1 full mock (shared across Lesen levels — pick A2 or B1). Pro includes 10 mocks per rolling 7 days across both A2 and B1 Lesen combined.
    - label: Should I do A2 Hören alongside Lesen?
      content: If you're prepping for the full Goethe-A2 exam, yes. The Goethe-A2 Hören track covers all 4 listening Teile with native German voices and is included in Pro.
