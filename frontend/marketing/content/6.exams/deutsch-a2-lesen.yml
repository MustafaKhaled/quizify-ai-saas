pains:
  title: Das A2-Lesen-Problem
  description: A2 reading looks deceptively simple — until you sit a real mock and realize the format is the trap, not the vocabulary.
  items:
    - You can read every word on a Wegweiser im Kaufhaus — but the question paraphrases what you're looking for, so you have to map "Geschenk für ein Kind" to "Spielwaren" yourself.
    - Teil 4 puts six ads on the page and five situations underneath. One situation has no match — you write "X" — but you've never practiced spotting which one.
    - The email in Teil 3 hedges with `vielleicht`, `eigentlich`, `aber`. The question asks what the writer actually plans to do. You translate every sentence; the timer runs out.
    - Your textbook has one A2 Lesen mock at the back. You've taken it twice and now you know the answers, not the format.
    - You've watched videos titled "A2 Lesen Übung" — they all use the same official sample. You've memorized that one too.
