faq:
  title: B1 Lesen — häufig gestellte Fragen
  items:
    - label: Is this aligned to the official Goethe-Zertifikat B1 Lesen format?
      content: Yes. Each mock contains all five Teile in the official order and shape — Teil 1 (one personal blog post, 6 richtig/falsch items), Teil 2 (two short press articles, 3+3 MCQ), Teil 3 (10 ads a–j + 7 situations, letter input or "0" for no match), Teil 4 (7 reader comments, Ja/Nein per author), Teil 5 (one institutional document, 4 MCQ). 30 items, 65 minutes.
    - label: How does the Anzeigen-Zuordnung (Teil 3) work?
      content: You see 10 lettered ads on a single theme and 7 situations describing different people's needs. For each situation, you type the letter (a–j) of the matching ad — or "0" if none of the ads fits. Quizify enforces the real-exam composition rules: exactly one no-match, six unique winning letters, four distractor-only ads. The frontend soft-warns if you type the same letter twice (each ad can match at most one situation) but doesn't block submission.
    - label: How long does generation take?
      content: A full 5-Teil mock takes ~10–20 seconds on Gemini 2.5 Flash. All five Teile are generated in parallel.
    - label: How many mocks do I get?
      content: Free trial includes 1 full mock (shared across Lesen levels). Pro includes 10 mocks per rolling 7 days across both A2 and B1 Lesen combined.
    - label: Can I see why each answer is correct?
      content: Yes. After completing each Teil, every question shows an English explanation with the German phrase from the source that proves (or disproves) the correct answer. You review what you missed before moving on.
    - label: Does this prepare me for the Hören (listening) part too?
      content: No — Lesen is reading only. For listening, see the Goethe-B1 Hören track (4 Teile with native German voices). Both modules are included in Pro.
