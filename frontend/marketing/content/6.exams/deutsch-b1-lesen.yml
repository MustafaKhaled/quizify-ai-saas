pains:
  title: Das B1-Lesen-Problem
  description: Most B1 candidates have read every grammar rule but never sat through a full Lesen mock under timed conditions. The Zuordnung task in Teil 3 alone breaks more candidates than any grammar mistake.
  items:
    - You can read a German blog post — but Teil 1 makes you decide six richtig/falsch statements that paraphrase the text, not quote it. Pattern matching dies here.
    - Teil 3 puts ten ads on the page and seven situations underneath. You have to actively rule out three "distractor ads" — and you've never practiced that under a timer.
    - Teil 4 gives you seven reader comments and asks Ja/Nein per author. The comments hedge. You guess.
    - Teil 5 hands you a Hausordnung in formal Sie-form and four MCQs that paraphrase specific clauses. You start re-reading the document for each question. Time runs out.
    - Your textbook has one mock at the back. You've taken it twice. You've memorized it instead of learning the format.
