faq:
  title: PMP-specific questions
  items:
    - label: Is the question style aligned to the current PMP exam (post-2021 update)?
      content: Yes. The corpus and prompt are tuned to the People, Process, and Business Environment domain split — including the agile and hybrid mindset questions that dominate the modern exam.
    - label: How does this differ from PrepCast, Brain Sensei, or Cornelius Fichtner?
      content: Those are excellent structured courses. Quizify is the practice layer on top — the part where you grind questions, find your weak topics, and drill them. Many candidates use both.
    - label: Are the questions copied from the official PMI sample exams?
      content: No. Quizify generates fresh, original questions on every run — you can't memorize a fixed bank, which would defeat the whole point of practice.
    - label: How many questions can I practice?
      content: On the Pro tier, unlimited. Run a 60-question full-length quiz, a 10-question domain drill, or a focused 5-question session on a single topic — as often as you want.
    - label: Can I focus on just the People domain?
      content: Yes. Pick the chapters or domains you want to drill and Quizify generates a quiz focused only there, with analytics to match.
