faq:
  title: B1-spezifische Fragen
  items:
    - label: Is this aligned to Goethe-Zertifikat B1, telc, or ÖSD?
      content: All three. The 17 grammar chapters cover the union of B1 syllabi — the question style is modeled on the way all three exams phrase B1-level items.
    - label: Will it retest A1 or A2 grammar?
      content: No. The instructions explicitly tell the AI not to waste questions retesting A1 or A2 mechanics. Every question either tests new B1 grammar or chains B1 with A1/A2 in a meaningful way.
    - label: Which B1 grammar is covered?
      content: 17 chapters — Konjunktiv II (komplett), Plusquamperfekt, Passiv (komplett), indirekte Rede (Konjunktiv I), Temporale / Finale / Konzessive Nebensätze, Konditionalsätze (real & irreal), advanced Relativsätze, Adjektivdeklination (komplett), N-Deklination, Verben + Präposition mit da-/wo-Komposita, Genitiv (komplett), Partizipien als Adjektive, subjektive Modalverben, Futur I & II, and Konjunktionaladverbien.
    - label: I haven't taken A2 yet — should I start with B1?
      content: Almost certainly not. B1 builds heavily on A2 Dativ, Wechselpräpositionen, and basic Konjunktiv II. If those aren't reflexes yet, drill the A2 track first — it's much faster than re-learning at the wrong level.
    - label: Is this enough for the Hören (listening) part of the exam?
      content: This track covers Grammatik. For Hören, see the dedicated Goethe-B1 Hören module — full audio mocks with all four Teile, generated on demand, included in your Pro plan.
    - label: Are explanations in German?
      content: No — explanations are in English so the underlying rule is unambiguous, even when the form is subtle. The only German inside an explanation is the quoted form being discussed (e.g., the article `dessen`, the verb `hätte gewusst`).
