pains:
  title: Klingt das vertraut?
  description: Sound familiar? B1 is where rules stop being patterns and start being judgement calls — and the exam tests you on the judgement, not the pattern.
  items:
    - You can recognize Konjunktiv II forms but freeze on irreal past — `hätte gewusst` versus `wüsste` versus `würde wissen`.
    - You hit Passiv mit Modalverb and the word order falls apart — `muss gelöst werden` or `gelöst werden muss`?
    - Indirekte Rede in Konjunktiv I feels like a different language — when does `er sei` flip to `er wäre`?
    - N-Deklination still trips you up — `den Studenten` or `den Student`? You guess and lose a point.
    - You learned `obwohl` and `trotzdem` mean the same thing, but the word order rules are different and you keep mixing them up.
