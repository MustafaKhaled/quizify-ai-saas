faq:
  title: A2 Hören — häufig gestellte Fragen
  items:
    - label: Is this aligned to the official Goethe-Zertifikat A2 Hören format?
      content: Yes. Each mock contains all four Teile in the official order — Teil 1 (5 short single-speaker monologues, MCQ, plays twice), Teil 2 (one short presentation, 5 MCQ, plays once), Teil 3 (two-speaker dialogue, 5 richtig/falsch, plays twice), Teil 4 (three-speaker discussion, 5 "wer sagt was" MCQ, plays twice).
    - label: Is the vocabulary really at A2 level?
      content: Yes. Scripts use everyday A2 vocabulary — family, daily routines, weather, shopping, hobbies, school, simple work. No business jargon, no abstract debates, no Konjunktiv II beyond `möchte` / `könnte` / `hätte`. Sentence structure stays simple.
    - label: How is this different from the B1 Hören track?
      content: Same architecture, different level. A2 uses shorter scripts (50–70% the word count of B1), simpler vocabulary, fewer comprehension items per Teil, and more replays per Teil. If you're planning to sit A2 within ~6 months, A2 Hören is the right starting point.
    - label: How long does generation take?
      content: A full 4-Teil mock takes ~2 minutes (Gemini writes the scripts, Edge TTS renders the audio for each Teil in parallel). The mock then stays in your library — you can replay it or take it again.
    - label: How many mocks do I get?
      content: Free trial includes 1 full mock (shared across Hören levels — pick A2 or B1). Pro includes 5 mocks per rolling 7 days across both A2 and B1 Hören combined.
    - label: Should I do A2 Lesen alongside Hören?
      content: If you're prepping for the full Goethe-A2 exam, yes. The Goethe-A2 Lesen track covers all 4 reading Teile (newspaper, directory, email, ad-matching) and is included in Pro.
