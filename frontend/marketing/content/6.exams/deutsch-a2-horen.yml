pains:
  title: Das A2-Hören-Problem
  description: Sound familiar? A2 listening is harder than A2 reading — by the time you've parsed the sentence, the speaker has moved on, and the question is about what came two sentences ago.
  items:
    - You know the words on paper but at speech tempo your brain runs out of buffer halfway through a sentence.
    - The recordings in your textbook all use the same two voices. Real A2 Hören uses different speakers for every Teil — your ear isn't trained for that variety yet.
    - You've taken the one mock at the back of your textbook three times and now you've memorized it instead of learning from it.
    - Teil 3 plays twice on the real exam — but you've never simulated that, so you don't know whether to commit on the first pass or wait for the second.
    - Teil 4 has three speakers and you can't track who said what because you're still translating each sentence in your head.
