title: Frequently Asked Questions
description: Everything you need to know about Quizify AI — curated certification tracks, the diagnostic quizzes, and how the practice loop is built around real exam outcomes.
items:
  - label: "What kind of platform is Quizify AI?"
    content: "A practice and assessment platform built around real outcomes — passing certifications and finding your weak spots. Each curated track (PMP, AWS Cloud Practitioner, German Grammar A1 / A2 / B1, plus Goethe Hören and Lesen at A2 and B1) is shaped by the official syllabus and tuned to mirror the question style, distractor patterns, and pacing of the real exam."
  - label: "Which certifications and tracks do you cover today?"
    content: "PMP (PMI's Project Management Professional), AWS Cloud Practitioner (CLF-C02), German Grammar at A1, A2, and B1 levels (CEFR — modeled on Goethe-Zertifikat, telc, and ÖSD style), Goethe-Zertifikat A2 & B1 Hören (listening) with on-demand multi-speaker audio mocks, and Goethe-Zertifikat A2 & B1 Lesen (reading) with full text-based mocks including the Anzeigen-Zuordnung task. New tracks roll out regularly — let us know which exam you'd like to see next."
  - label: "How is this different from generic AI quiz tools?"
    content: "Generic tools generate plausible-looking questions; Quizify generates questions that train you for the exam you're actually sitting. Each curated track has its own question shapes, distractor patterns, and difficulty curve. The dashboard then tells you per topic which areas are blocking your pass — so study time goes where it actually moves your score."
  - label: "How exam-realistic are the questions?"
    content: "Closely calibrated. Scenario-based MCQs for PMP that test the PMI mindset; 'which AWS service for X' for cloud, written the way the real CLF-C02 phrases trade-offs; mini-context fill-in-the-blank and two-blank chained-rule questions for German grammar; Hören comprehension after fresh multi-speaker audio; Lesen Anzeigen-Zuordnung where you type the matching letter just like the real exam. Distractors mirror real candidate mistakes — wrong gender on -ung nouns, wrong AWS service for the cost-optimized scenario, the heroic-action trap on PMP."
  - label: "How does the per-topic weakness analytics work?"
    content: "Every quiz scores you per chapter, then the dashboard ranks topics by how much your overall score will move if you fix them. You see at a glance whether your weak spot is Konjunktiv II, IAM, or risk management — not 'the AWS exam' or 'the PMP exam'. Quiz by quiz, you can watch weak topics shrink and turn into strong ones."
  - label: "What do the Goethe Hören tracks include?"
    content: "Full Hören mock exams at A2 and B1 — all four Teile generated on demand with native German Azure Neural voices. Distinct voices per speaker for the multi-speaker dialogues and panels, real exam pacing with per-Teil play limits (Teil 4 plays twice on B1; Teile 1, 3, and 4 play twice on A2). Each mock follows the official Goethe-Zertifikat format, with comprehension questions and per-Teil scoring. Pro plans include 5 Hören mocks per rolling 7 days across both A2 and B1 combined."
  - label: "What do the Goethe Lesen tracks include?"
    content: "Full Lesen mock exams at A2 (4 Teile, 20 questions, 30-min timer) and B1 (5 Teile, 30 questions, 65-min timer) — generated on demand. Includes the trickiest part of the format, Anzeigen-Zuordnung (10 ads + 7 situations on B1; 6 ads + 5 situations on A2), with a text input for the matching letter and a soft-warn if you reuse one. Each mock follows the official format with per-Teil scoring and English explanations grounded in German quotes from the source. Pro plans include 10 Lesen mocks per rolling 7 days across both levels combined."
  - label: "What's the difference between Hören and Lesen?"
    content: "Hören is listening — you hear audio (with native German voices for multi-speaker scripts) and answer comprehension questions. Lesen is reading — you read passages, articles, ads, and emails on screen and answer comprehension questions. They're separate Goethe exam sections with their own format and pacing rules. Pro includes both, and they have separate rolling-7-day quotas (5 Hören, 10 Lesen)."
  - label: "Does the timer simulate real exam conditions?"
    content: "Yes. The timer matches the duration of the real exam — PMP, AWS, Goethe Hören, Goethe Lesen — and runs a full pacing simulation so you build the rhythm you'll need on test day, not just under ideal study conditions."
  - label: "How does the free trial work?"
    content: "Seven days, 3 practice quizzes, plus 1 Hören mock and 1 Lesen mock (pick any level for each) — enough to see how the platform finds your weak spots and tells you what to do about them. No credit card required."
  - label: "Can I share my quizzes with study groups?"
    content: "Pro users can generate share links. Your classmates take the same quiz against the same material, which is great for collaborative review sessions and group certification prep."
  - label: "Can I cancel my Pro subscription at any time?"
    content: "Yes. One click from account settings. You keep Pro features until the end of the current billing cycle, no clawback."
  - label: "Do you offer student discounts?"
    content: "Our yearly plan is already 25% off the monthly rate. For campus-wide licenses or groups of 10+, contact support for bulk pricing."
  - label: "Is my data secure?"
    content: "Your account, results, and progress data are encrypted at rest and used only to power your own dashboard. We do not train global AI models on your activity."
