title: Frequently Asked Questions
description: Everything you need to know about Quizify AI — curated exam tracks, PDF uploads, and how the practice quizzes are built.
items:
  - label: "What are curated subjects, and how do they differ from uploading a PDF?"
    content: "Curated subjects are pre-built exam tracks — PMP, AWS Cloud Practitioner, German Grammar A1, German Grammar A2 — with chapters, a syllabus, and a question style modeled on the official exam. You pick a topic and start practicing in ten seconds, no upload needed. PDF upload is for material we don't have a curated track for: your lecture notes, a course chapter, internal training documents. Pro gives you unlimited access to both."
  - label: "Which curated subjects are available right now?"
    content: "PMP (PMI's Project Management Professional), AWS Cloud Practitioner (CLF-C02), German Grammar A1 (CEFR), and German Grammar A2 (CEFR — modeled on Goethe-Zertifikat, telc, and ÖSD style). We add new tracks regularly — let us know which exam you'd like to see next."
  - label: "How exam-realistic are the generated questions?"
    content: "For curated subjects, very. We model question style on the actual exam: scenario-based MCQs for PMP, 'which AWS service for X' for cloud, mini-context fill-in-the-blank and two-blank chained-rule questions for German grammar. Distractors are calibrated to common mistakes — not random other forms — so the wrong answers actually teach you the rule."
  - label: "How accurate are the quizzes generated from my own PDFs?"
    content: "Our AI grounds every question in the source text and is tuned for academic rigor, but we always recommend cross-checking against your material for high-stakes exams. Each generated question cites the chapter or page it came from."
  - label: "Does the timer simulate real exam conditions?"
    content: "Yes. You can match the timer to your actual exam — PMP, AWS, Goethe-Zertifikat — and practice the pacing the way you'll need it on test day."
  - label: "What types of files can I upload?"
    content: "PDF, DOCX (Word), PPTX (PowerPoint), and TXT. Page-range selection is available for PDFs so you can focus on a single chapter."
  - label: "Is there a limit on PDF length?"
    content: "For best results, keep PDFs under 100 pages. For longer textbooks, upload one chapter at a time — the questions stay tighter and the analytics more useful."
  - label: "Can I share my quizzes with study groups?"
    content: "Pro users can generate share links. Your classmates take the same quiz against the same material, which is great for collaborative review sessions."
  - label: "How do the analytics work?"
    content: "After every quiz, Quizify breaks down your score by topic and surfaces the two or three areas most worth your next study session — ranked by how much your overall score will move. Stop re-reading what you already know."
  - label: "Can I cancel my Pro subscription at any time?"
    content: "Yes. One click from account settings. You keep Pro features until the end of the current billing cycle."
  - label: "Do you offer student discounts?"
    content: "Our yearly plan is already 25% off the monthly rate. For campus-wide licenses or groups of 10+, contact support for bulk pricing."
  - label: "Is my data and PDF content secure?"
    content: "Your uploaded files are encrypted at rest and used only to generate your own quizzes. We don't train global AI models on your documents."
