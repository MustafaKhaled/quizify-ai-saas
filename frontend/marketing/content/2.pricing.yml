faq:
  title: Frequently asked questions
  description: The questions we hear most often from candidates and language learners.
  items:
    - label: What's the difference between curated subjects and uploading my own PDF?
      content: Curated subjects (PMP, AWS Cloud Practitioner, German A1, German A2) are pre-built tracks with chapters, syllabi, and question styles modeled on the real exam — you pick a topic and start practicing instantly. PDF upload is for everything else: lecture notes, course slides, internal training material. Both are included in Pro.
    - label: Which exams do the curated subjects cover?
      content: PMP (PMI's Project Management Professional), AWS Cloud Practitioner (CLF-C02), German Grammar A1, and German Grammar A2 (CEFR — modeled on Goethe-Zertifikat, telc, and ÖSD). More tracks roll out regularly.
    - label: How does the free tier work?
      content: 3 AI-generated quizzes per month against your own uploaded material, plus access to a limited preview of curated subjects. No credit card required to sign up.
    - label: Can I cancel my Pro subscription at any time?
      content: Yes — one click from your account settings. You keep Pro access until the end of your current billing cycle, no clawback.
    - label: Do you offer student discounts?
      content: The yearly plan is already 25% off the monthly rate. For campus-wide licenses or groups of 10+, contact support for bulk pricing.
    - label: Is my data secure?
      content: Your uploaded PDFs are encrypted at rest and used only to generate your own quizzes. We do not train global AI models on your documents.
