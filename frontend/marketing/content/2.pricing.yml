faq:
  title: Frequently asked questions
  description: The questions we hear most often from certification candidates and language learners.
  items:
    - label: Which certifications and tracks do you cover?
      content: PMP (PMI's Project Management Professional), AWS Cloud Practitioner (CLF-C02), and German Grammar at A1, A2, and B1 levels — modeled on Goethe-Zertifikat, telc, and ÖSD. Plus dedicated Goethe Hören (listening) modules at A2 and B1 with on-demand multi-speaker audio mocks, and Goethe Lesen (reading) modules at A2 and B1 with full text-based exams including the Anzeigen-Zuordnung task. New tracks roll out regularly.
    - label: How is this different from generic AI quiz tools?
      content: Each curated track is shaped by the official syllabus — chapters, question style, distractor patterns, and difficulty curve are all calibrated to the real exam. Generic tools generate plausible-looking questions; Quizify generates questions that train you for the exam you're actually sitting.
    - label: How does the per-topic weakness analytics work?
      content: Every quiz scores you per chapter, then the dashboard ranks topics by how much your overall score will move if you fix them. You stop re-reading what you already know and spend study hours where they actually shift your pass-readiness.
    - label: How do the Hören mock exams work?
      content: Pick a Goethe Hören level (A2 or B1) and Quizify generates a fresh full mock — all four Teile, native German Azure Neural voices for multi-speaker dialogues and panels, real exam pacing with per-Teil play limits. Pro plans include 5 Hören mocks per rolling 7 days across both levels combined.
    - label: How do the Lesen mock exams work?
      content: Pick a Goethe Lesen level (A2 or B1) and Quizify generates a fresh full mock — A2 has 4 Teile (newspaper, Wegweiser, email, 6-ad matching), B1 has 5 Teile (blog, two articles, 10-ad Zuordnung, reader comments, institutional doc). The matching task uses a text input where you type the matching letter, just like the real exam. Pro plans include 10 Lesen mocks per rolling 7 days across both levels combined.
    - label: How does the free trial work?
      content: Seven days, 3 practice quizzes, plus 1 Hören mock and 1 Lesen mock (pick any level) — enough to see how the platform finds your weak spots and tells you what to do about them. No credit card required to sign up.
    - label: Can I cancel my Pro subscription at any time?
      content: Yes — one click from your account settings. You keep Pro access until the end of your current billing cycle, no clawback.
    - label: Do you offer student discounts?
      content: The yearly plan is already 25% off the monthly rate. For campus-wide licenses or groups of 10+, contact support for bulk pricing.
    - label: Is my data secure?
      content: Your account, results, and progress data are encrypted at rest and used only to power your own dashboard. We do not train global AI models on your activity.
