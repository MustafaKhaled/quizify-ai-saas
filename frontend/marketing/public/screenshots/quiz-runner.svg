<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" role="img" aria-label="Quiz runner placeholder">
  <defs>
    <linearGradient id="runnerBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#1E293B"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#runnerBg)" rx="12"/>
  <!-- header with timer -->
  <rect x="24" y="24" width="752" height="56" fill="#1E293B" stroke="#334155" rx="8"/>
  <text x="44" y="58" fill="#94A3B8" font-family="system-ui" font-size="12">Question 4 of 10</text>
  <rect x="44" y="64" width="200" height="6" fill="#334155" rx="3"/>
  <rect x="44" y="64" width="80" height="6" fill="#22D3EE" rx="3"/>
  <rect x="640" y="40" width="120" height="24" fill="#334155" rx="12"/>
  <circle cx="654" cy="52" r="5" fill="#F97316"/>
  <text x="668" y="56" fill="#E2E8F0" font-family="system-ui" font-size="12" font-weight="600">12:34</text>
  <!-- question card -->
  <rect x="100" y="108" width="600" height="78" fill="#1E293B" stroke="#334155" rx="8"/>
  <text x="120" y="138" fill="#94A3B8" font-family="system-ui" font-size="11" font-weight="600" letter-spacing="0.5">DATIV · GERMAN A2</text>
  <text x="120" y="170" fill="#F1F5F9" font-family="system-ui" font-size="16">Ich helfe ___ Mann.</text>
  <!-- options -->
  <rect x="100" y="206" width="600" height="46" fill="#1E293B" stroke="#334155" rx="8"/>
  <circle cx="124" cy="229" r="9" stroke="#475569" fill="none"/>
  <text x="148" y="234" fill="#E2E8F0" font-family="system-ui" font-size="14">der</text>
  <rect x="100" y="262" width="600" height="46" fill="#1E293B" stroke="#334155" rx="8"/>
  <circle cx="124" cy="285" r="9" stroke="#475569" fill="none"/>
  <text x="148" y="290" fill="#E2E8F0" font-family="system-ui" font-size="14">den</text>
  <rect x="100" y="318" width="600" height="46" fill="#0E7490" stroke="#22D3EE" rx="8" opacity="0.3"/>
  <rect x="100" y="318" width="600" height="46" fill="none" stroke="#22D3EE" rx="8"/>
  <circle cx="124" cy="341" r="9" fill="#22D3EE"/>
  <text x="148" y="346" fill="#F1F5F9" font-family="system-ui" font-size="14" font-weight="600">dem</text>
  <rect x="100" y="374" width="600" height="46" fill="#1E293B" stroke="#334155" rx="8"/>
  <circle cx="124" cy="397" r="9" stroke="#475569" fill="none"/>
  <text x="148" y="402" fill="#E2E8F0" font-family="system-ui" font-size="14">des</text>
  <!-- swap-me hint -->
  <text x="400" y="442" fill="#475569" font-family="system-ui" font-size="9" text-anchor="middle">screenshot placeholder — replace with real quiz capture at /screenshots/quiz-runner.png</text>
</svg>
