<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" role="img" aria-label="Results placeholder">
  <defs>
    <linearGradient id="resultsBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#1E293B"/>
    </linearGradient>
    <linearGradient id="scoreRing" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22D3EE"/>
      <stop offset="100%" stop-color="#22C55E"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#resultsBg)" rx="12"/>
  <!-- score ring -->
  <circle cx="180" cy="180" r="90" fill="none" stroke="#334155" stroke-width="14"/>
  <circle cx="180" cy="180" r="90" fill="none" stroke="url(#scoreRing)" stroke-width="14"
    stroke-dasharray="500" stroke-dashoffset="100" stroke-linecap="round" transform="rotate(-90 180 180)"/>
  <text x="180" y="178" fill="#F1F5F9" font-family="system-ui" font-size="42" font-weight="700" text-anchor="middle">82%</text>
  <text x="180" y="208" fill="#94A3B8" font-family="system-ui" font-size="12" text-anchor="middle">Score</text>
  <!-- topic breakdown bars -->
  <text x="320" y="100" fill="#94A3B8" font-family="system-ui" font-size="11" font-weight="600" letter-spacing="0.5">TOPIC BREAKDOWN</text>
  <rect x="320" y="120" width="100" height="10" fill="#475569" rx="2"/>
  <text x="320" y="116" fill="#E2E8F0" font-family="system-ui" font-size="12">Wechselpräpositionen</text>
  <rect x="430" y="118" width="350" height="14" fill="#1E293B" rx="3"/>
  <rect x="430" y="118" width="315" height="14" fill="#22C55E" rx="3"/>
  <text x="755" y="129" fill="#E2E8F0" font-family="system-ui" font-size="11" font-weight="600" text-anchor="end">90%</text>
  <rect x="320" y="156" width="100" height="10" fill="#475569" rx="2"/>
  <text x="320" y="152" fill="#E2E8F0" font-family="system-ui" font-size="12">Dativ</text>
  <rect x="430" y="154" width="350" height="14" fill="#1E293B" rx="3"/>
  <rect x="430" y="154" width="280" height="14" fill="#22D3EE" rx="3"/>
  <text x="755" y="165" fill="#E2E8F0" font-family="system-ui" font-size="11" font-weight="600" text-anchor="end">80%</text>
  <rect x="320" y="192" width="100" height="10" fill="#475569" rx="2"/>
  <text x="320" y="188" fill="#E2E8F0" font-family="system-ui" font-size="12">Konjunktiv II</text>
  <rect x="430" y="190" width="350" height="14" fill="#1E293B" rx="3"/>
  <rect x="430" y="190" width="158" height="14" fill="#F97316" rx="3"/>
  <text x="755" y="201" fill="#E2E8F0" font-family="system-ui" font-size="11" font-weight="600" text-anchor="end">45%</text>
  <rect x="320" y="228" width="100" height="10" fill="#475569" rx="2"/>
  <text x="320" y="224" fill="#E2E8F0" font-family="system-ui" font-size="12">Reflexivverben</text>
  <rect x="430" y="226" width="350" height="14" fill="#1E293B" rx="3"/>
  <rect x="430" y="226" width="245" height="14" fill="#22D3EE" rx="3"/>
  <text x="755" y="237" fill="#E2E8F0" font-family="system-ui" font-size="11" font-weight="600" text-anchor="end">70%</text>
  <!-- focus area -->
  <rect x="80" y="300" width="700" height="120" fill="#1E293B" stroke="#334155" rx="8"/>
  <text x="100" y="328" fill="#F1F5F9" font-family="system-ui" font-size="13" font-weight="600">Focus next on</text>
  <rect x="100" y="346" width="180" height="56" fill="#0F172A" stroke="#F97316" rx="6"/>
  <text x="116" y="368" fill="#F97316" font-family="system-ui" font-size="11" font-weight="600">WEAK · 45%</text>
  <text x="116" y="388" fill="#E2E8F0" font-family="system-ui" font-size="13">Konjunktiv II</text>
  <rect x="296" y="346" width="180" height="56" fill="#0F172A" stroke="#475569" rx="6"/>
  <text x="312" y="368" fill="#94A3B8" font-family="system-ui" font-size="11" font-weight="600">REVIEW · 70%</text>
  <text x="312" y="388" fill="#E2E8F0" font-family="system-ui" font-size="13">Reflexivverben</text>
  <!-- swap-me hint -->
  <text x="400" y="442" fill="#475569" font-family="system-ui" font-size="9" text-anchor="middle">screenshot placeholder — replace with real results capture at /screenshots/results.png</text>
</svg>
